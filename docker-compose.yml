services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: doodle_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: doodle_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: doodle_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doodle_clone
      MYSQL_USER: doodle
      MYSQL_PASSWORD: doodle
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: doodle_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: doodle_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db_data:
  redis_data:
